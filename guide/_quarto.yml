project:
  type: website
  output-dir: ../docs

website:
  title: "The Clo-Author for Codex"
  navbar:
    left:
      - text: "Quick Start"
        href: index.qmd
      - text: "User Guide"
        href: user-guide.qmd
      - text: "Agents"
        href: agents.qmd
      - text: "Architecture"
        href: architecture.qmd
      - text: "Customization"
        href: customization.qmd
      - text: "Reference"
        href: reference.qmd
      - text: "What's New"
        href: changelog.qmd
    right:
      - icon: github
        href: https://github.com/AnthonyPuggs/codex-author
  page-footer:
    center: "Built with [Quarto](https://quarto.org)"

format:
  html:
    theme:
      light: [flatly, styles/theme-light.scss]
      dark: [slate, styles/theme-dark.scss]
    respect-user-color-scheme: true
    syntax-highlighting:
      light: arrow
      dark: arrow-dark
    toc: true
    toc-depth: 3
    code-copy: true
    code-overflow: wrap
    smooth-scroll: true
    mainfont: "Public Sans, system-ui, sans-serif"
    monofont: "IBM Plex Mono, Menlo, Consolas, monospace"
    mermaid:
      theme: neutral
